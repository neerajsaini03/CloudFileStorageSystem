{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header text-center bg-success text-white">

                <h3>Create Account</h3>

            </div>

            <div class="card-body">

                <form method="POST">

    <div class="mb-3">

        <label>Full Name</label>

        <input
            type="text"
            name="fullname"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label>Email</label>

        <input
            type="email"
            name="email"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label>Password</label>

        <input
            type="password"
            name="password"
            class="form-control"
            required>

    </div>

    <button
        class="btn btn-success w-100">

        Register

    </button>

</form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
