{% extends "base.html" %}

{% block title %}
Verify OTP
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header text-center">
                <h3>Verify OTP</h3>
            </div>

            <div class="card-body">

                <form method="POST" action="{{ url_for('auth.verify_otp') }}">

                    <input
                        type="hidden"
                        name="email"
                        value="{{ email }}">

                    <div class="mb-3">

                        <label class="form-label">
                            Enter 6-Digit OTP
                        </label>

                        <input
                            type="text"
                            name="otp"
                            maxlength="6"
                            class="form-control"
                            required>

                    </div>

                    <button
                        class="btn btn-success w-100">

                        Verify OTP

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
