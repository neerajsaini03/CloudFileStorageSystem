{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3>User Profile</h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="fullname"
                                value="{{ current_user.fullname }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                value="{{ current_user.email }}"
                                readonly>

                        </div>

                        <hr>

                        <h5>Change Password</h5>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="current_password">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="new_password">

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
