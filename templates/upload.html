{% extends "base.html" %}

{% block title %}
Upload File
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            Upload File

        </div>

        <div class="card-body">

            <form
                method="POST"
                enctype="multipart/form-data">

                <input
                    type="file"
                    name="file"
                    class="form-control"
                    required>

                <br>

                <button
                    class="btn btn-success">

                    Upload

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
